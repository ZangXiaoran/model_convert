name: 310P3 一次必成版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: harbor.apulis.cn:443/aihub/ascend-cann:7.0.0.1046
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: 转换 ONNX 到 OM (310P3 专用)
        run: |
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          
          atc --model=./yolo/best.onnx \
              --framework=5 \
              --output=yolo_310P3 \
              --soc_version=Ascend310P \
              --input_format=NCHW \
              --precision_mode=force_fp16

      - name: 上传模型
        uses: actions/upload-artifact@v4
        with:
          name: om_model_310P3
          path: ./*.om
