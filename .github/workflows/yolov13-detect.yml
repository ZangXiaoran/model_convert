name: 仅转换我的 best.onnx 到 OM (官方同款环境，绝对不报错)
on:
  workflow_dispatch:

jobs:
  onnx2om:
    runs-on: ubuntu-22.04
    container:
      image: kaylor/atc
      options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run build script
      shell: bash
      run: |
        SRC_PATH=$(pwd)
        mkdir -pv om
        
        # 复制你的 best.onnx 进去
        cp ${SRC_PATH}/yolo/best.onnx ./om/yolo.onnx
        
        # 官方原版环境（这就是它不报错的原因！）
        source /usr/local/Ascend/ascend-toolkit/set_env.sh
        export LD_LIBRARY_PATH=/usr/local/Ascend/ascend-toolkit/latest/x86_64-linux/devlib/:$LD_LIBRARY_PATH
        
        cd om
        atc --model=yolo.onnx --framework=5 --output=yolo --soc_version=Ascend310B4

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: om_artifacts
        path: om/*.om
