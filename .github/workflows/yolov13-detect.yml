name: 310P3 一次必成版 (公开镜像)
on:
  workflow_dispatch:

jobs:
  onnx2om:
    runs-on: ubuntu-22.04
    container:
      # 公开镜像，GitHub 可直接拉取，CANN 7.0 完美支持 310P
      image: ascendai/cann:7.0.0.alpha001
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 转换 ONNX 到 OM (310P3 专用)
        shell: bash
        run: |
          # 加载昇腾环境
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          
          # 执行转换，适配 310P3
          atc --model=./yolo/best.onnx \
              --framework=5 \
              --output=yolo_310P3 \
              --soc_version=Ascend310P \
              --input_format=NCHW \
              --precision_mode=force_fp16

      - name: 上传模型
        uses: actions/upload-artifact@v4
        with:
          name: om_model_310P3
          path: ./*.om
