name: 仅转换我的 best.onnx 到 OM
on:
  workflow_dispatch:

jobs:
  my_onnx2om:
    runs-on: ubuntu-22.04
    container:
      image: kaylor/atc
      options: --privileged

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 转换 ONNX 到 OM
        run: |
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          atc --model=yolo/best.onnx \
              --framework=5 \
              --output=best \
              --soc_version=Ascend310B4

      - name: 上传 OM 模型
        uses: actions/upload-artifact@v4
        with:
          name: my_best_om
          path: best.om
